<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <nav>
            <div class="navbar">
                <h1>Student Grading Application</h1>
                <p style="font-style: italic;">Manage student profiles and grades efficienty.</p>
            </div>
            <button class="dark-button" id="toggle-button" onclick="but()"><span id="icon">🌙 Dark Mode</span></button>
        </nav>
    </header>
    <main class="card" id="main-content">
        <section>
            <h1 id="h1">Add New Student</h1>
            <form id="form-data">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter name">
                <label>Age</label>
                <input type="number" id="age" placeholder="Enter age" min="1" max="100" step="1">
                <label>Course</label>
                <input type="text" id="course" placeholder="Enter course">
                <label>Grade</label>
                <select id="grade">
                    <option>Select Grade</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                    <option>D</option>
                    <option>F</option>
                </select>
                <br/><br/>
                <div class="but-group">
                    <button type="submit" class="button button1">Add Student</button>
                    <button type="reset" class="button button2">Clear</button>
                </div>
            </form>
        </section>
        <section>
            <h1 id="h11">Student List</h1>
            <form>
                <input type="text" placeholder="Search by name" id="searchName">
                <br/><br/>
                <select id="filterGrade">
                    <option>Filter by Grade</option>
                    <option>A</option>
                    <option>B</option>
                    <option>C</option>
                    <option>D</option>
                    <option>F</option>
                </select>
                <br/><br/>
                <button class="button button3" id="refreshBtn">Refresh Data</button>
                <div id="output">

                </div>
            </form>
        </section>
    </main>
    <footer>
        <button class="footer-button">+</button>
        <p class="footer">© 2024 Student Grading App | <a href="">Privacy Policy</a> | <a href="">Terms of Service</a></p>
    </footer>
    <script src="./index.js"></script>
</body>
</html>
